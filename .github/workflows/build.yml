name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements-build.txt

      - name: Compilar ejecutable con PyInstaller
        run: pyinstaller main.spec

      - name: Determinar version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(.+)$') {
            $version = $Matches[1]
          } else {
            $sha = $env:GITHUB_SHA.Substring(0, 7)
            $version = "dev-$env:GITHUB_RUN_NUMBER-$sha"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version determinada: $version"

      - name: Instalar Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compilar instalador con Inno Setup
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc installer.iss "/DMyAppVersion=${{ steps.version.outputs.VERSION }}"

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: RestauranteManager-${{ steps.version.outputs.VERSION }}
          path: installer_output/ItalosManager_Setup.exe
          retention-days: 30

      - name: Publicar Release oficial (en tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/ItalosManager_Setup.exe
          generate_release_notes: true

      - name: Actualizar pre-release latest-dev (en push a main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: "Ultima version de desarrollo"
          prerelease: true
          files: installer_output/ItalosManager_Setup.exe
          generate_release_notes: false
          body: |
            Build automatico desde la rama `main`.

            **Version:** `${{ steps.version.outputs.VERSION }}`
            **Commit:** ${{ github.sha }}
